# Fragmento Apache 2.4 — rotas da SPA (React Router / Vite)
#
# Sem isto, URLs como /admin/whatsapp devolvem 404 ao abrir em novo separador
# ou F5, porque o Apache procura um ficheiro físico nesse path.
#
# Requer: a2enmod rewrite
# Coloque dentro do VirtualHost HTTPS do app (ex.: app.clienton.com.br-le-ssl.conf),
# tipicamente no mesmo <Directory "/var/www/app"> onde já tem Require/Options,
# ou num segundo bloco Directory para o mesmo path.
#
# Depois: apachectl configtest && systemctl reload apache2

<Directory "/var/www/app">
  RewriteEngine On
  RewriteBase /
  RewriteRule ^index\.html$ - [L]
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule ^ /index.html [L]
</Directory>
