# Fragmento para o VirtualHost do APP (ex.: app.clienton.com.br).
# Impede cache agressivo de index.html após deploy da SPA (Vite).
#
# Requer: a2enmod headers
# Inclua dentro do <VirtualHost *:443> ... do app, depois recarregue: apachectl configtest && systemctl reload apache2

<Directory "/var/www/app">
  <IfModule mod_headers.c>
    # HTML sem cache longo — o navegador busca index novo e pega o JS com hash novo
    <FilesMatch "\.(html|htm)$">
      Header set Cache-Control "no-cache, no-store, must-revalidate"
      Header set Pragma "no-cache"
    </FilesMatch>
    # Assets com hash no nome podem ser cacheados (opcional; Vite já nomeia com hash)
    <FilesMatch "\.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$">
      Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
  </IfModule>
</Directory>

# Ajuste "/var/www/app" para o DocumentRoot real do seu app.
